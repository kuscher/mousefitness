<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003c5a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bggrad)" />
  
  <g transform="translate(150, 300)">
    <text x="0" y="0" font-family="sans-serif" font-size="80" font-weight="bold" fill="#ffffff">Mouse Fitness</text>
    <text x="0" y="50" font-family="sans-serif" font-size="32" fill="#cae6ff">Turn web browsing into a marathon.</text>
    <text x="0" y="100" font-family="sans-serif" font-size="24" fill="#cae6ff">Track your pixels, unlock milestones,</text>
    <text x="0" y="140" font-family="sans-serif" font-size="24" fill="#cae6ff">and see how far you really travel.</text>
  </g>
  
  <g transform="translate(800, 150)" filter="url(#shadow)">
    <!-- Fake App UI Window -->
    <rect width="360" height="500" rx="16" fill="#ffffff" />
    <rect width="360" height="60" rx="16" fill="#f8f9fa" />
    
    <!-- UI Header -->
    <svg x="20" y="20" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#006493" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="7" ry="7"></rect>
      <line x1="12" y1="6" x2="12" y2="10"></line>
    </svg>
    <text x="55" y="38" font-family="sans-serif" font-size="18" font-weight="bold" fill="#006493">Mouse Fitness</text>
    
    <!-- Dashboard Mockup -->
    <rect x="20" y="80" width="150" height="100" rx="12" fill="#cae6ff" />
    <text x="35" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#006493">Total Distance</text>
    <text x="35" y="150" font-family="sans-serif" font-size="28" font-weight="bold" fill="#006493">42.2 <tspan font-size="16">km</tspan></text>
    
    <rect x="190" y="80" width="150" height="100" rx="12" fill="#f0f4f8" />
    <text x="205" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Today</text>
    <text x="205" y="150" font-family="sans-serif" font-size="28" font-weight="bold" fill="#333">1.5 <tspan font-size="16">km</tspan></text>
    
    <rect x="20" y="200" width="320" height="180" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <text x="35" y="230" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Activity Graph</text>
    <!-- Mock Bar Chart -->
    <rect x="35" y="320" width="30" height="40" rx="4" fill="#cae6ff" />
    <rect x="75" y="280" width="30" height="80" rx="4" fill="#cae6ff" />
    <rect x="115" y="260" width="30" height="100" rx="4" fill="#cae6ff" />
    <rect x="155" y="250" width="30" height="110" rx="4" fill="#cae6ff" />
    <rect x="195" y="300" width="30" height="60" rx="4" fill="#cae6ff" />
    <rect x="235" y="240" width="30" height="120" rx="4" fill="#cae6ff" />
    <rect x="275" y="290" width="30" height="70" rx="4" fill="#cae6ff" />
    
    <!-- Mock Milestones -->
    <rect x="20" y="400" width="320" height="80" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
    <circle cx="50" cy="440" r="16" fill="#4caf50" />
    <text x="50" y="446" font-family="sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">✓</text>
    <text x="80" y="435" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Marathon (42.2km)</text>
    <text x="80" y="455" font-family="sans-serif" font-size="12" fill="#666">You are a mouse athlete.</text>
  </g>
</svg>
